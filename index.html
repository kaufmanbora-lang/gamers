<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>20 мини-игр с ИИ</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <aside class="sidebar" aria-label="Список мини-игр">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">20</div>
          <div>
            <h1>Мини-игры с ИИ</h1>
            <p>Настольные дуэли</p>
          </div>
        </div>
        <nav id="game-list" class="game-list"></nav>
      </aside>

      <section class="table">
        <header class="topbar">
          <div>
            <span id="game-tag" class="game-tag"></span>
            <h2 id="game-title"></h2>
            <p id="game-subtitle"></p>
          </div>
          <div class="top-actions">
            <div class="difficulty-control" aria-label="Сложность ИИ">
              <button class="difficulty-button" type="button" data-difficulty="easy">Лёгкий</button>
              <button class="difficulty-button active" type="button" data-difficulty="medium">Средний</button>
              <button class="difficulty-button" type="button" data-difficulty="hard">Сложный</button>
              <button class="difficulty-button" type="button" data-difficulty="cyber">Кибер</button>
            </div>
            <button id="reset-game" class="reset-button" type="button">Сброс</button>
          </div>
        </header>

        <div id="status" class="status" role="status" aria-live="polite"></div>
        <div id="game-root" class="game-root"></div>
        <div id="scorebar" class="scorebar"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
